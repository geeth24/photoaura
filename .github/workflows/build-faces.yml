# Build the InsightFace embedding service image and deploy via Rad-Soft/argocd.
# Scoped to face-service/ — bumps values/photoaura-faces.yaml in the argocd repo.

name: Build & Deploy Faces

on:
  push:
    branches: [main]
    paths: ["face-service/**"]
  workflow_dispatch:

concurrency:
  group: deploy-faces-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, universal]
    steps:
      - uses: actions/checkout@v4

      - name: Build & Push
        run: |
          docker build -t registry.rsft.co/photoaura-faces:latest -t registry.rsft.co/photoaura-faces:${GITHUB_SHA} ./face-service
          docker push registry.rsft.co/photoaura-faces:latest
          docker push registry.rsft.co/photoaura-faces:${GITHUB_SHA}

      - name: Mint argocd repo token
        id: argocd-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RAD_SOFT_ARGOCD_APP_ID }}
          private-key: ${{ secrets.RAD_SOFT_ARGOCD_PRIVATE_KEY }}
          owner: Rad-Soft
          repositories: argocd

      - name: Bump tag in argocd repo
        env:
          GITHUB_TOKEN: ${{ steps.argocd-token.outputs.token }}
        run: |
          WORKDIR=$(mktemp -d)
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/Rad-Soft/argocd.git "$WORKDIR"
          cd "$WORKDIR"
          SHORT_SHA=${GITHUB_SHA::7}
          sed -i "s|tag:.*# faces-tag|tag: ${GITHUB_SHA} # faces-tag|" values/photoaura-faces.yaml
          git config user.name "rad-soft-argocd[bot]"
          git config user.email "rad-soft-argocd[bot]@users.noreply.github.com"
          git add values/photoaura-faces.yaml
          if git diff --cached --quiet; then
            echo "No tag change — skipping commit"
          else
            git commit -m "deploy photoaura-faces: ${SHORT_SHA}"
            git push
          fi
