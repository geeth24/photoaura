# Build the backend image and deploy via the centralized Rad-Soft/argocd repo.
#
# 1. Builds + pushes registry.rsft.co/photoaura:<sha>
# 2. Bumps the image tag in Rad-Soft/argocd values/photoaura.yaml (cross-repo)
# 3. ArgoCD reconciles and rolls out; the image entrypoint runs DB migrations
#
# Repo secrets required: RAD_SOFT_ARGOCD_APP_ID, RAD_SOFT_ARGOCD_PRIVATE_KEY

name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore: ["**.md", "client/**"]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, universal]
    steps:
      - uses: actions/checkout@v4

      - name: Build & Push
        run: |
          docker build -t registry.rsft.co/photoaura:latest -t registry.rsft.co/photoaura:${GITHUB_SHA} .
          docker push registry.rsft.co/photoaura:latest
          docker push registry.rsft.co/photoaura:${GITHUB_SHA}

      - name: Mint argocd repo token
        id: argocd-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RAD_SOFT_ARGOCD_APP_ID }}
          private-key: ${{ secrets.RAD_SOFT_ARGOCD_PRIVATE_KEY }}
          owner: Rad-Soft
          repositories: argocd

      - name: Bump tag in argocd repo
        env:
          GITHUB_TOKEN: ${{ steps.argocd-token.outputs.token }}
        run: |
          WORKDIR=$(mktemp -d)
          git clone https://x-access-token:${GITHUB_TOKEN}@github.com/Rad-Soft/argocd.git "$WORKDIR"
          cd "$WORKDIR"
          SHORT_SHA=${GITHUB_SHA::7}
          sed -i "s|tag:.*# backend-tag|tag: ${GITHUB_SHA} # backend-tag|" values/photoaura.yaml
          git config user.name "rad-soft-argocd[bot]"
          git config user.email "rad-soft-argocd[bot]@users.noreply.github.com"
          git add values/photoaura.yaml
          if git diff --cached --quiet; then
            echo "No tag change — skipping commit"
          else
            git commit -m "deploy photoaura: ${SHORT_SHA}"
            git push
          fi
