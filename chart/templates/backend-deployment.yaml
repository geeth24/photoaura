{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.global.name }}-backend
  labels:
    app: {{ .Values.global.name }}-backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.global.name }}-backend
  template:
    metadata:
      labels:
        app: {{ .Values.global.name }}-backend
    spec:
      containers:
        - name: backend
          image: {{ .Values.global.registry }}/{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.backend.port }}

          livenessProbe:
            httpGet:
              path: {{ .Values.backend.healthCheck.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.healthCheck.path }}
              port: {{ .Values.backend.port }}
            initialDelaySeconds: 10
            periodSeconds: 5

          env:
            {{- if .Values.postgres.enabled }}
            - name: POSTGRES_HOST
              value: {{ .Values.global.name }}-postgres
            - name: POSTGRES_PORT
              value: {{ .Values.postgres.port | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.username }}
            - name: POSTGRES_DB
              value: {{ .Values.postgres.database }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.postgres.passwordSecretRef }}
                  key: {{ .Values.postgres.passwordSecretKey }}
            {{- end }}
            {{- range $key, $value := .Values.backend.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}

          {{- if .Values.backend.secretRef }}
          envFrom:
            - secretRef:
                name: {{ .Values.backend.secretRef }}
            - secretRef:
                name: {{ .Values.global.name }}-google-creds
          {{- end }}

          {{- if .Values.backend.persistence.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.backend.persistence.mountPath }}
          {{- end }}

          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}

      {{- if .Values.backend.persistence.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.global.name }}-data
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.global.name }}-backend
spec:
  selector:
    app: {{ .Values.global.name }}-backend
  ports:
    - port: {{ .Values.backend.port }}
      targetPort: {{ .Values.backend.port }}
---
{{- if .Values.backend.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Values.global.name }}-data
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.backend.persistence.size }}
{{- end }}
{{- end }}
