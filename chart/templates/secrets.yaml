{{- /*
  Secrets are created manually on the cluster, not from values.yaml
  This template is just a placeholder/reminder.

  Create secrets on the cluster with:
  kubectl create secret generic photoaura-secrets \
    --from-literal=POSTGRES_PASSWORD=your-password \
    --from-literal=ROOT_PASSWORD=your-root-password \
    --from-literal=AWS_ACCESS_KEY=your-aws-key \
    --from-literal=AWS_SECRET_KEY=your-aws-secret \
    --from-literal=GOOGLE_CALENDAR_CREDENTIALS='{"type":"service_account",...}' \
    --from-literal=RESEND_API_KEY=your-resend-key \
    -n photoaura
*/ -}}
